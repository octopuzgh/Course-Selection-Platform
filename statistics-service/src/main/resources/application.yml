spring:
  application:
    name: statistics-service
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

spark:
  app-name: StatisticsOffline
  master: local[*]
  driver-memory: 512m
  sql-adaptive-enabled: true
  sql-adaptive-coalesce-partitions-enabled: true
  enabled: false

server:
  port: ${STATISTICS_SERVICE_PORT:8082}

logging:
  level:
    com.octopuz.statisticsservice: ${LOG_LEVEL:INFO}

