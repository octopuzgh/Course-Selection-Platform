spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: statistics-service
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${STATISTICS_SERVICE_PORT:8082}

basic-service:
  url: ${BASIC_SERVICE_URL:http://localhost:8080}

logging:
  level:
    com.octopuz.statisticsservice: ${LOG_LEVEL:INFO}
