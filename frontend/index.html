<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>选课平台前端</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="学生选课前端 - 支持多服务架构 (8080/8081/8082)" />
</head>
<body>
  <header>
    <h1>学生选课系统</h1>
    <div id="user-info" class="hidden">
      <div id="user-details-inline">
        <span id="user-studentno"></span>
        <span id="user-name"></span>
        <span id="user-major"></span>
        <span id="user-grade"></span>
      </div>
      <span id="current-role" class="role-badge"></span>
      <button id="logout-btn" class="small-btn">退出登录</button>
    </div>
  </header>

  <main>
    <section id="login-view" class="view">
      <div class="login-container">
        <h2>用户登录</h2>
        <div class="login-form">
          <div class="form-group">
            <label>用户名:</label>
            <input id="login-userid" placeholder="请输入用户名" />
          </div>
          <div class="form-group">
            <label>密码:</label>
            <input id="login-password" type="password" placeholder="请输入密码" />
          </div>
          <button id="login-btn" class="action">登录</button>
          <div id="login-error" class="error-msg"></div>
        </div>
      </div>
    </section>

    <section id="main-app" class="hidden">
      <nav>
        <button id="nav-course-display" class="active">课程展示</button>
        <button id="nav-course-selection">退选课</button>
        <button id="nav-students">学生列表</button>
        <button id="nav-admin" class="hidden">管理面板</button>
      </nav>

      <section id="course-display-view" class="view">
        <div class="controls">
          <button id="refresh-course-display">刷新课程</button>
        </div>
        <div id="course-display"></div>
        <div class="pagination" id="course-display-pagination"></div>
      </section>

      <section id="course-selection-view" class="view hidden">
        <div class="controls">
          <label>学号: <input id="selection-student-no" placeholder="例如 2024001" /></label>
          <button id="refresh-course-selection">刷新课程</button>
          <span id="service-status-indicator" class="service-status"></span>
        </div>
        <div class="search-controls">
          <label>课程号: <input id="search-course-no" placeholder="搜索课程号" /></label>
          <label>课程名称: <input id="search-course-name" placeholder="搜索课程名称" /></label>
          <label>教师: <input id="search-teacher" placeholder="搜索教师" /></label>
          <button id="search-course-btn">搜索</button>
          <button id="clear-search-btn">清除</button>
        </div>
        <div id="course-selection"></div>
        <div class="pagination" id="course-selection-pagination"></div>
      </section>

      <section id="students-view" class="view hidden">
        <h2>学生列表</h2>
        <button id="refresh-students-list" class="action">刷新学生列表</button>
        <div id="students-list-container"></div>
        <div class="pagination" id="students-list-pagination"></div>
      </section>

      <section id="admin-view" class="view hidden">
        <h2>管理面板</h2>
        
        <div class="admin-section">
          <h3>课程管理</h3>
          <div class="admin-form">
            <input id="admin-course-no" placeholder="课程号" />
            <input id="admin-course-name" placeholder="课程名称" />
            <input id="admin-course-teacher" placeholder="教师" />
            <input id="admin-course-credit" type="number" placeholder="学分" />
            <input id="admin-course-capacity" type="number" placeholder="总容量" />
            <button id="admin-add-course" class="action success">添加课程</button>
          </div>
          <div class="delete-course-form">
            <input id="delete-course-no" placeholder="要删除的课程号" />
            <button id="admin-delete-course" class="action danger">删除课程</button>
          </div>
          <div class="search-course-form">
            <input id="admin-search-course-no" placeholder="搜索课程号" />
            <button id="admin-search-course-btn" class="action">搜索课程</button>
          </div>
          <div id="admin-search-course-result"></div>
        </div>

        <div class="admin-section">
          <h3>学生管理</h3>
          <div class="admin-form">
            <input id="admin-student-no" placeholder="学号" />
            <input id="admin-student-name" placeholder="姓名" />
            <input id="admin-student-major" placeholder="专业" />
            <input id="admin-student-grade" placeholder="年级" />
            <button id="admin-add-student" class="action success">添加学生</button>
          </div>
          <div class="delete-student-form">
            <input id="delete-student-no" placeholder="要删除的学号" />
            <button id="admin-delete-student" class="action danger">删除学生</button>
          </div>
          <div class="search-student-form">
            <input id="admin-search-student-no" placeholder="搜索学号" />
            <button id="admin-search-student-btn" class="action">搜索学生</button>
          </div>
          <div id="admin-search-student-result"></div>
        </div>
      </section>

    </section>
  </main>

  <footer>
    <small>本前端为演示用途，调用后端服务：8080(basic-service) / 8081(selection-service) / 8082(statistics-service)</small>
  </footer>

  <!-- 
    环境变量配置 - 在 app.js 加载前设置
    开发环境: window.BACKEND_HOST = '192.168.137.1'
    生产环境: window.BACKEND_HOST = 'localhost' (默认)
  -->
  <script>
    // 可以通过修改这里的值来切换环境
    window.BACKEND_HOST = '192.168.137.1'  // 测试环境
    // window.BACKEND_HOST = 'localhost'  // 生产环境（默认）
  </script>
  <script src="app.js"></script>
</body>
</html>
