<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>选课平台前端</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="学生选课前端 - 支持多服务架构 (8080/8081/8082)" />
</head>
<body>
  <header>
    <h1>学生选课系统</h1>
    <div id="user-info" class="hidden">
      <div id="user-details-inline">
        <span id="user-studentno"></span>
        <span id="user-name"></span>
        <span id="user-major"></span>
        <span id="user-grade"></span>
      </div>
      <span id="current-role" class="role-badge"></span>
      <button id="logout-btn" class="small-btn">退出登录</button>
    </div>
  </header>

  <main>
    <section id="login-view" class="view">
      <div class="login-container">
        <h2>用户登录</h2>
        <div class="login-form">
          <div class="form-group">
            <label>用户名:</label>
            <input id="login-userid" placeholder="请输入用户名" />
          </div>
          <div class="form-group">
            <label>密码:</label>
            <input id="login-password" type="password" placeholder="请输入密码" />
          </div>
          <button id="login-btn" class="action">登录</button>
          <div id="login-error" class="error-msg"></div>
        </div>
      </div>
    </section>

    <section id="main-app" class="hidden">
      <nav>
        <button id="nav-course-display" class="active">课程展示</button>
        <button id="nav-course-selection">退选课</button>
        <button id="nav-personal-info">个人信息</button>
        <button id="nav-students" class="hidden">学生列表</button>
        <button id="nav-admin" class="hidden">管理面板</button>
      </nav>

      <section id="course-display-view" class="view">
        <div class="controls">
          <button id="refresh-course-display">刷新课程</button>
        </div>
        <div id="course-display"></div>
        <div class="pagination" id="course-display-pagination"></div>
      </section>

      <section id="course-selection-view" class="view hidden">
        <h2>退选课</h2>
        <div class="controls">
          <label id="selection-student-label" class="hidden">学号: <input id="selection-student-no" placeholder="例如 2024001" /></label>
          <button id="refresh-course-selection">刷新课程</button>
          <span id="service-status-indicator" class="service-status"></span>
        </div>
        <div class="search-controls">
          <label>课程号: <input id="search-course-no" placeholder="搜索课程号" /></label>
          <label>课程名称: <input id="search-course-name" placeholder="搜索课程名称" /></label>
          <label>教师: <input id="search-teacher" placeholder="搜索教师" /></label>
          <button id="search-course-btn">搜索</button>
          <button id="clear-search-btn">清除</button>
        </div>
        <div id="course-selection"></div>
        <div class="pagination" id="course-selection-pagination"></div>
      </section>

      <section id="personal-info-view" class="view hidden">
        <h2>个人信息</h2>
        <div id="personal-info-container"></div>
      </section>

      <section id="students-view" class="view hidden">
        <h2>学生列表</h2>
        <div class="controls">
          <button id="refresh-students-list">刷新学生列表</button>
        </div>
        
        <!-- 学生搜索区域 -->
        <div class="search-controls">
          <label>学号: <input id="search-student-no" placeholder="搜索学号" /></label>
          <label>姓名: <input id="search-student-name" placeholder="搜索姓名" /></label>
        </div>
        <div id="student-search-results"></div>
        
        <div id="students-list-wrapper">
          <div id="students-list-container"></div>
          <div class="pagination" id="students-list-pagination"></div>
        </div>
      </section>

      <section id="admin-view" class="view hidden">
        <h2>管理面板</h2>
        
        <!-- 统计功能按钮 -->
        <div class="admin-section">
          <h3>数据统计</h3>
          <div class="admin-form">
            <button id="admin-realtime-stats" class="action">实时统计</button>
            <button id="admin-offline-stats" class="action">离线统计</button>
          </div>
        </div>
        
        <div class="admin-section">
          <h3>课程管理</h3>
          <div class="admin-form">
            <input id="admin-course-no" placeholder="课程号" />
            <input id="admin-course-name" placeholder="课程名称" />
            <input id="admin-course-teacher" placeholder="教师" />
            <input id="admin-course-credit" type="number" placeholder="学分" />
            <input id="admin-course-capacity" type="number" placeholder="总容量" />
            <button id="admin-add-course" class="action success">添加课程</button>
          </div>
          <div class="delete-course-form">
            <input id="delete-course-no" placeholder="要删除的课程号" />
            <button id="admin-delete-course" class="action danger">删除课程</button>
          </div>
          <div class="search-course-form">
            <input id="admin-search-course-no" placeholder="搜索课程号" />
            <button id="admin-search-course-btn" class="action">搜索课程</button>
          </div>
          <div id="admin-search-course-result"></div>
        </div>

        <div class="admin-section">
          <h3>学生管理</h3>
          <div class="admin-form">
            <input id="admin-student-no" placeholder="学号" />
            <input id="admin-student-name" placeholder="姓名" />
            <input id="admin-student-major" placeholder="专业" />
            <input id="admin-student-grade" placeholder="年级" />
            <button id="admin-add-student" class="action success">添加学生</button>
          </div>
          <div class="delete-student-form">
            <input id="delete-student-no" placeholder="要删除的学号" />
            <button id="admin-delete-student" class="action danger">删除学生</button>
          </div>
          <div class="search-student-form">
            <input id="admin-search-student-no" placeholder="搜索学号" />
            <button id="admin-search-student-btn" class="action">搜索学生</button>
          </div>
          <div id="admin-search-student-result"></div>
        </div>
      </section>

      <!-- 实时统计页面 -->
      <section id="realtime-stats-view" class="view hidden">
        <div class="controls">
          <button id="back-to-admin">返回管理面板</button>
        </div>
        
        <!-- 系统选课总次数 -->
        <div class="admin-section">
          <h3>系统统计概览</h3>
          <div id="total-selection-count" style="font-size: 1.5rem; font-weight: bold; color: #2c3e50; padding: 1rem; text-align: center;">
            加载中...
          </div>
        </div>
        
        <!-- 导航栏 -->
        <nav class="stats-nav">
          <button id="nav-selection-stats" class="active">选课统计</button>
          <button id="nav-popular-courses">热门课程</button>
        </nav>
        
        <!-- 选课统计面板 -->
        <section id="selection-stats-panel" class="stats-panel">
          <!-- 今日统计 -->
          <div class="admin-section">
            <h3>今日统计</h3>
            <div id="today-stats-container">
              <p>加载中...</p>
            </div>
          </div>
          
          <!-- 往期数据 -->
          <div class="admin-section">
            <h3>往期数据</h3>
            <div class="date-selector">
              <label>年：<select id="stats-year-select"></select></label>
              <label>月：<select id="stats-month-select"></select></label>
              <label>日：<select id="stats-day-select"></select></label>
              <button id="load-historical-stats" class="action">查询</button>
            </div>
            <div id="historical-stats-container"></div>
          </div>
        </section>
        
        <!-- 热门课程面板 -->
        <section id="popular-courses-panel" class="stats-panel hidden">
          <!-- 今日热门 -->
          <div class="admin-section">
            <h3>今日热门</h3>
            <div id="today-popular-container">
              <p>加载中...</p>
            </div>
          </div>
          
          <!-- 往期热门 -->
          <div class="admin-section">
            <h3>往期热门</h3>
            <div class="date-selector">
              <label>年：<select id="popular-year-select"></select></label>
              <label>月：<select id="popular-month-select"></select></label>
              <label>日：<select id="popular-day-select"></select></label>
              <button id="load-historical-popular" class="action">查询</button>
            </div>
            <div id="historical-popular-container"></div>
          </div>
        </section>
      </section>

      <!-- 离线统计页面 -->
      <section id="offline-stats-view" class="view hidden">
        <div class="controls">
          <button id="back-to-admin-from-offline">返回管理面板</button>
        </div>
        
        <!-- 导航栏 -->
        <nav class="stats-nav">
          <button id="nav-course-ranking" class="active">历史课程排名</button>
          <button id="nav-course-history">课程历史统计</button>
          <button id="nav-selection-trend">选课趋势</button>
        </nav>
        
        <!-- 历史课程排名面板 -->
        <section id="course-ranking-panel" class="stats-panel">
          <div class="admin-section">
            <h3>历史课程排名</h3>
            <div id="course-ranking-chart-container" style="position: relative; height: 600px;">
              <canvas id="course-ranking-chart"></canvas>
            </div>
            <!-- 分页控制器 -->
            <div class="pagination" id="course-ranking-pagination"></div>
          </div>
        </section>
        
        <!-- 课程历史统计面板 -->
        <section id="course-history-panel" class="stats-panel hidden">
          <!-- 统计概览 -->
          <div class="admin-section">
            <h3>统计概览</h3>
            <div id="stats-summary-container">
              <p>加载中...</p>
            </div>
          </div>
          
          <!-- 单门课程历史统计 -->
          <div class="admin-section">
            <h3>单门课程历史统计</h3>
            <div class="date-selector">
              <label>课程号：<input id="course-history-input" placeholder="例如 CS101" style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;" /></label>
              <button id="load-course-history" class="action">查询</button>
            </div>
            <div id="course-history-container"></div>
          </div>
        </section>
        
        <!-- 选课趋势面板 -->
        <section id="selection-trend-panel" class="stats-panel hidden">
          <div class="admin-section">
            <h3>选课趋势</h3>
            <div class="date-selector">
              <label>起始日期：<input type="date" id="trend-start-date" style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;" /></label>
              <label>结束日期：<input type="date" id="trend-end-date" style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;" /></label>
              <button id="load-selection-trend" class="action">查询</button>
            </div>
            <div id="selection-trend-container"></div>
          </div>
        </section>
      </section>

    </section>
  </main>

  <footer>
    <small>本前端为演示用途，调用后端服务：8080(basic-service) / 8081(selection-service) / 8082(statistics-service)</small>
  </footer>

  <!-- 
    环境变量配置 - 在 app.js 加载前设置
    开发环境: window.BACKEND_HOST = '192.168.137.1'
    生产环境: window.BACKEND_HOST = 'localhost' (默认)
  -->
  <!-- Chart.js 图表库 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    // 可以通过修改这里的值来切换环境
    // window.BACKEND_HOST = '192.168.137.1'  // 测试环境
    window.BACKEND_HOST = 'localhost'  // 生产环境（默认）
  </script>
  <script src="app.js"></script>
</body>
</html>
